[project]
name = "aigw-agent"
version = "0.1.0"
requires-python = ">=3.12"
description = "SimCorp AI Gateway — laptop agent CLI"
dependencies = [
    "websockets>=12.0",
    "httpx>=0.27",
    "click>=8.1",
    "rich>=13.0",
]
[project.scripts]
aigw-agent = "aigw_agent.cli:main"
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["aigw_agent"]
