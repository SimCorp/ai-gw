storage:
  type: sqlite
  path: /data/gatus.db

web:
  port: 8080

metrics: true

endpoints:
  - name: auth
    group: "Tier 0 — Critical"
    url: http://auth:8001/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: cache
    group: "Tier 0 — Critical"
    url: http://cache:8002/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: litellm
    group: "Tier 0 — Critical"
    url: http://litellm:8003/health/liveliness
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: litellm-providers
    group: "Tier 0 — Critical"
    url: http://litellm:8003/health/readiness
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 2000"

  - name: observability
    group: "Tier 1 — Important"
    url: http://observability:8004/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: admin
    group: "Tier 1 — Important"
    url: http://admin:8005/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: identity
    group: "Tier 2 — Background"
    url: http://identity:8006/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: agent-relay
    group: "Tier 2 — Background"
    url: http://agent-relay:8007/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: librarian
    group: "Tier 2 — Background"
    url: http://librarian:8008/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: memory
    group: "Tier 2 — Background"
    url: http://memory:8009/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: league
    group: "Tier 2 — Background"
    url: http://league:8010/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: scanner
    group: "Tier 2 — Background"
    url: http://scanner:8011/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: graphify
    group: "Tier 2 — Background"
    url: http://graphify:8012/health
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: admin-portal
    group: "Tier 1 — Important"
    url: http://admin-portal:3001/admin/login
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 2000"

  - name: portal
    group: "Tier 1 — Important"
    url: http://portal:3002/
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 2000"

  # Readiness probes — check data-plane dependencies (Redis/Postgres).
  # liveness-green + readiness-red = DB/Redis issue; liveness-red = container crash.

  - name: auth-ready
    group: "Tier 0 — Critical"
    url: http://auth:8001/ready
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: cache-ready
    group: "Tier 0 — Critical"
    url: http://cache:8002/ready
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: admin-ready
    group: "Tier 1 — Important"
    url: http://admin:8005/ready
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: identity-ready
    group: "Tier 2 — Background"
    url: http://identity:8006/ready
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: librarian-ready
    group: "Tier 2 — Background"
    url: http://librarian:8008/ready
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: memory-ready
    group: "Tier 2 — Background"
    url: http://memory:8009/ready
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  # Checks the live TLS certificate. Fires if < 14 days remain.
  - name: tls-cert
    group: "Tier 0 — Critical"
    url: https://dev.aigw.scdom.net
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 336h"
