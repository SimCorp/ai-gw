# Test profile overlay — use with:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.test.yml --profile test ...
#
# Services here only start when --profile test is supplied; they share the
# default "aigateway" network so internal DNS (auth, cache, ...) resolves.

services:

  test-runner:
    build:
      context: ../tests
    profiles: [test]
    restart: "no"
    depends_on:
      auth:
        condition: service_healthy
      cache:
        condition: service_healthy
      litellm:
        condition: service_healthy
      observability:
        condition: service_healthy
      admin:
        condition: service_healthy
    environment:
      AUTH_URL: http://auth:8001
      CACHE_URL: http://cache:8002
      GATEWAY_URL: http://cache:8002
      LITELLM_URL: http://litellm:8003
      OBSERVABILITY_URL: http://observability:8004
      ADMIN_URL: http://admin:8005
      ADMIN_TOKEN: ${ADMIN_TOKEN:-local-dev-admin-key-change-in-prod}
      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:-false}
    volumes:
      # Mount tests/ read-only so the runner always sees the latest sources
      - ../tests:/tests:ro

  claude-agent:
    build:
      context: ../tests/claude-agent
    profiles: [claude-agent]
    stdin_open: true
    tty: true
    restart: "no"
    depends_on:
      cache:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: http://cache:8002/anthropic
      GATEWAY_CACHE_URL: http://cache:8002
      GATEWAY_AUTH_URL: http://auth:8001
