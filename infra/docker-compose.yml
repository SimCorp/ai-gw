name: ai-gateway

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aigateway
      POSTGRES_USER: aigateway
      POSTGRES_PASSWORD: aigateway
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigateway"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis/redis-stack:7.2.0-v14
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Redis Sentinel (HA profile) ───────────────────────────────────────────────
  # Enable with: docker compose --profile sentinel up
  # Services use REDIS_URL=redis+sentinel://sentinel-1:26379,sentinel-2:26379,sentinel-3:26379/mymaster/0
  # or REDIS_SENTINEL_HOSTS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379

  redis-master:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_master_data:/data

  redis-replica:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: redis-server --replicaof redis-master 6379 --save "" --loglevel warning
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-sentinel-1:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    ports:
      - "127.0.0.1:26379:26379"
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-2:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    ports:
      - "127.0.0.1:26380:26379"
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-3:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    ports:
      - "127.0.0.1:26381:26379"
    depends_on:
      redis-master:
        condition: service_healthy

  dex:
    image: dexidp/dex:v2.40.0
    ports:
      - "127.0.0.1:5556:5556"
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama  # opt-in: docker compose --profile ollama up

  # ── AI Gateway services ───────────────────────────────────────────────────────

  db-migrate:
    # Runs Alembic against the admin service's migrations (services/admin/migrations).
    # Replaces the legacy `psql -f init.sql` path; the baseline migration
    # (0001_baseline.py) captures the union of init.sql + _EXTRA_DDL.
    build:
      context: ../services/admin
    environment:
      # asyncpg URL because app/db.py creates an async engine at module import time
      # (env.py rewrites to psycopg2 internally for Alembic's sync operations)
      DATABASE_URL: "postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway"
    command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  litellm:
    build:
      context: ../services/litellm
    ports:
      - "127.0.0.1:8003:8003"
    env_file: ../.env
    environment:
      # LiteLLM uses Prisma which requires postgresql:// not postgresql+asyncpg://
      DATABASE_URL: "postgresql://aigateway:aigateway@postgres:5432/aigateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health/liveliness')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  auth:
    build:
      context: ../services/auth
    ports:
      - "127.0.0.1:8001:8001"
    env_file: ../.env
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      # Uses /ready so Docker only marks the service healthy when Redis + Postgres are reachable
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  cache:
    build:
      context: ../services/cache
    ports:
      - "127.0.0.1:8002:8002"
    env_file: ../.env
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal-key}
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/ready')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  observability:
    build:
      context: ../services/observability
    ports:
      - "127.0.0.1:8004:8004"
    env_file: ../.env
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal-key}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  admin:
    build:
      context: ../services/admin
    ports:
      - "127.0.0.1:8005:8005"
    env_file: ../.env
    environment:
      ENVIRONMENT: development
      MCP_ALLOW_LOCAL_URLS: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  league:
    build:
      context: ../services/league
    ports:
      - "127.0.0.1:8010:8010"
    env_file: ../.env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: "postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway"
      REDIS_URL: "redis://redis:6379/0"
      LITELLM_URL: "http://litellm:8003"
      # In local dev, bypass JWT validation so seeded league pages render
      # without wiring per-request Authorization headers in portal fetches.
      # Production must run with DEV_BYPASS_AUTH=false.
      DEV_BYPASS_AUTH: "true"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  scanner:
    build:
      context: ../services/scanner
    ports:
      - "127.0.0.1:8011:8011"
    env_file: ../.env
    environment:
      ENVIRONMENT: development
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8011/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  it-tools:
    image: ghcr.io/corentinth/it-tools@sha256:8b8128748339583ca951af03dfe02a9a4d7363f61a216226fc28030731a5a61f
    restart: unless-stopped
    # No published port — accessed only through nginx at /tools-app/

  admin-portal:
    image: node:20-alpine
    working_dir: /app/apps/admin
    command: npm run dev
    volumes:
      - ..:/app
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_ADMIN_API: "http://localhost:8080/admin"
    depends_on:
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/admin-portal/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  portal:
    image: node:20-alpine
    working_dir: /app/apps/portal
    command: npm run dev
    volumes:
      - ..:/app
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_ADMIN_BASE_URL: "http://localhost:8080/admin"
      NEXT_PUBLIC_CACHE_BASE_URL: "http://localhost:8080/cache"
      NEXT_PUBLIC_IDENTITY_BASE_URL: "http://localhost:8080/identity"
      NEXT_PUBLIC_LIBRARIAN_BASE_URL: "http://localhost:8080/librarian"
      NEXT_PUBLIC_MEMORY_BASE_URL: "http://localhost:8080/memory"
      NEXT_PUBLIC_LITELLM_BASE_URL: "http://localhost:8080/litellm"
      NEXT_PUBLIC_LITELLM_KEY: "sk-litellm-local-dev"
    depends_on:
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3002/portal/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  agent-relay:
    build:
      context: ../services/agent-relay
    ports:
      - "127.0.0.1:8007:8007"
    environment:
      REDIS_URL: "redis://redis:6379/0"
      AGENT_RELAY_SECRET: ""
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8007/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  workflow-worker:
    build:
      context: ../services/workflow-worker
    environment:
      DATABASE_URL: "postgresql://aigateway:aigateway@postgres:5432/aigateway"
      REDIS_URL: "redis://redis:6379/0"
      WORKER_CONCURRENCY: "5"
      WORKER_ID: "wf-worker-1"
      # Host-side path for per-run input/output files. Worker writes here at
      # /worker-runs; agent containers mount the SAME host path at /run.
      HOST_RUNS_PATH: "/tmp/aigw-runs"
      AGENT_CONTAINER_NETWORK: "aigateway"
      AGENT_RELAY_URL: "http://agent-relay:8007"
      AGENT_RELAY_SECRET: ""
      ADMIN_INTERNAL_TOKEN: ""
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/aigw-runs:/worker-runs
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  identity:
    build:
      context: ../services/identity
    ports:
      - "127.0.0.1:8006:8006"
    environment:
      DATABASE_URL: "postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway"
      REDIS_URL: "redis://redis:6379/0"
      ADMIN_URL: "http://admin:8005"
      IDENTITY_SERVICE_TOKEN: ""
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8006/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  librarian:
    build:
      context: ../services/librarian
    ports:
      - "127.0.0.1:8008:8008"
    environment:
      DATABASE_URL: "postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway"
      REDIS_URL: "redis://redis:6379/0"
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-sk-local-placeholder}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://ollama:11434/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      CACHE_URL: "http://cache:8002"
      LIBRARIAN_SERVICE_TOKEN: ""
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8008/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  memory:
    build:
      context: ../services/memory
    ports:
      - "127.0.0.1:8009:8009"
    environment:
      DATABASE_URL: "postgresql://aigateway:aigateway@postgres:5432/aigateway"
      AUTH_URL: "http://auth:8001"
      ADMIN_URL: "http://admin:8005"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-sk-local-placeholder}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-http://ollama:11434/v1}"
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8009/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  claude-sandbox:
    build:
      context: ./claude-sandbox
    profiles: [sandbox]
    ports:
      - "127.0.0.1:2222:22"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: http://cache:8002/anthropic
      GATEWAY_CACHE_URL: http://cache:8002
      GATEWAY_ADMIN_URL: http://admin:8005
    depends_on:
      cache:
        condition: service_healthy
      auth:
        condition: service_healthy
    restart: unless-stopped

  hub:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      # Directory mounts (not file mounts) so inode replacements from editor
      # writes are visible inside the container without a full restart.
      - ./html/:/usr/share/nginx/html/:ro
      - ./nginx/:/etc/nginx/conf.d/:ro
    depends_on:
      auth:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  redis_master_data:

networks:
  default:
    name: aigateway
