name: ai-gateway

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aigateway
      POSTGRES_USER: aigateway
      POSTGRES_PASSWORD: aigateway
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
      # Creates the separate `litellm` database on first init (before healthy),
      # so LiteLLM's Prisma schema doesn't collide with the admin/Alembic DB.
      - ./postgres/init-litellm.sql:/docker-entrypoint-initdb.d/00-init-litellm.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigateway"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis/redis-stack:7.2.0-v14
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Redis Sentinel (HA profile) ───────────────────────────────────────────────
  # Enable with: docker compose --profile sentinel up
  # Services use REDIS_URL=redis+sentinel://sentinel-1:26379,sentinel-2:26379,sentinel-3:26379/mymaster/0
  # or REDIS_SENTINEL_HOSTS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379

  redis-master:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_master_data:/data

  redis-replica:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: redis-server --replicaof redis-master 6379 --save "" --loglevel warning
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-sentinel-1:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    ports:
      - "127.0.0.1:26379:26379"
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-2:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    ports:
      - "127.0.0.1:26380:26379"
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-3:
    image: redis:7.2-alpine
    profiles: [sentinel]
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf"
    ports:
      - "127.0.0.1:26381:26379"
    depends_on:
      redis-master:
        condition: service_healthy

  dex:
    image: dexidp/dex:v2.40.0
    ports:
      - "127.0.0.1:5556:5556"
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama  # opt-in: docker compose --profile ollama up

  # ── AI Gateway services ───────────────────────────────────────────────────────

  db-migrate:
    # Runs Alembic against the admin service's migrations (services/admin/migrations).
    # Replaces the legacy `psql -f init.sql` path; the baseline migration
    # (0001_baseline.py) captures the union of init.sql + _EXTRA_DDL.
    build:
      context: ../services/admin
    env_file: ../.env
    environment:
      # asyncpg URL because app/db.py creates an async engine at module import time
      # (env.py rewrites to psycopg2 internally for Alembic's sync operations)
      DATABASE_URL: "postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway"
    command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  litellm:
    build:
      context: ../services/litellm
    ports:
      - "127.0.0.1:8003:8003"
    env_file: ../.env
    environment:
      # LiteLLM uses Prisma which requires postgresql:// not postgresql+asyncpg://.
      # Dedicated DB (created by postgres init) — keeps Prisma's schema separate
      # from the admin/Alembic-owned `aigateway` DB (avoids Prisma P3005).
      DATABASE_URL: "postgresql://aigateway:aigateway@postgres:5432/litellm"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health/liveliness')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  auth:
    build:
      context: ../services/auth
    ports:
      - "127.0.0.1:8001:8001"
    env_file: ../.env
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      # Uses /ready so Docker only marks the service healthy when Redis + Postgres are reachable
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  cache:
    build:
      context: ../services/cache
    ports:
      - "127.0.0.1:8002:8002"
    env_file: ../.env
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal-key}
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/ready')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  observability:
    build:
      context: ../services/observability
    ports:
      - "127.0.0.1:8004:8004"
    env_file: ../.env
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal-key}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  admin:
    build:
      context: ../services/admin
    ports:
      - "127.0.0.1:8005:8005"
    env_file: ../.env
    environment:
      ENVIRONMENT: development
      MCP_ALLOW_LOCAL_URLS: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  league:
    build:
      context: ../services/league
    ports:
      - "127.0.0.1:8010:8010"
    env_file: ../.env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: "postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway"
      REDIS_URL: "redis://redis:6379/0"
      LITELLM_URL: "http://litellm:8003"
      # In local dev, bypass JWT validation so seeded league pages render
      # without wiring per-request Authorization headers in portal fetches.
      # Production must run with DEV_BYPASS_AUTH=false.
      DEV_BYPASS_AUTH: "true"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  scanner:
    build:
      context: ../services/scanner
    ports:
      - "127.0.0.1:8011:8011"
    env_file: ../.env
    environment:
      ENVIRONMENT: development
      AUTH_URL: http://auth:8001
      DATABASE_URL: "postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway"
      REDIS_URL: "redis://redis:6379/0"
      SCANNER_WORKER_SECRET: ${SCANNER_WORKER_SECRET:-dev-worker-secret}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal-key}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8011/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  admin-portal:
    build:
      context: ..
      dockerfile: Dockerfile.admin
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_ADMIN_API: "https://dev.aigw.scdom.net/api/admin"
      NEXT_PUBLIC_LEAGUE_API: "https://dev.aigw.scdom.net/api/league"
    depends_on:
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/admin/login || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  portal:
    build:
      context: ..
      dockerfile: Dockerfile.portal
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_ADMIN_BASE_URL: "https://dev.aigw.scdom.net/api/admin"
      NEXT_PUBLIC_CACHE_BASE_URL: "https://dev.aigw.scdom.net/api/cache"
      NEXT_PUBLIC_IDENTITY_BASE_URL: "https://dev.aigw.scdom.net/api/identity"
      NEXT_PUBLIC_LIBRARIAN_BASE_URL: "https://dev.aigw.scdom.net/api/librarian"
      NEXT_PUBLIC_MEMORY_BASE_URL: "https://dev.aigw.scdom.net/api/memory"
      NEXT_PUBLIC_LITELLM_BASE_URL: "https://dev.aigw.scdom.net/api/litellm"
      NEXT_PUBLIC_LEAGUE_API: "https://dev.aigw.scdom.net/api/league"
      NEXT_PUBLIC_LITELLM_KEY: "sk-litellm-local-dev"
    depends_on:
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3002/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  agent-relay:
    build:
      context: ../services/agent-relay
    ports:
      - "127.0.0.1:8007:8007"
    environment:
      REDIS_URL: "redis://redis:6379/0"
      # Shared relay secret. Dev default keeps the stack working; prod sets a
      # real value from Key Vault. workflow-worker must use the SAME value
      # (its AGENT_RELAY_SECRET) — the relay validates RELAY_SECRET against it.
      AGENT_RELAY_SECRET: ${AGENT_RELAY_SECRET:-dev-relay-secret}
      RELAY_SECRET: ${RELAY_SECRET:-dev-relay-secret}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8007/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  workflow-worker:
    build:
      context: ../services/workflow-worker
    environment:
      DATABASE_URL: "postgresql://aigateway:aigateway@postgres:5432/aigateway"
      REDIS_URL: "redis://redis:6379/0"
      WORKER_CONCURRENCY: "5"
      WORKER_ID: "wf-worker-1"
      # Host-side path for per-run input/output files. Worker writes here at
      # /worker-runs; agent containers mount the SAME host path at /run.
      HOST_RUNS_PATH: "/tmp/aigw-runs"
      AGENT_CONTAINER_NETWORK: "aigateway"
      AGENT_RELAY_URL: "http://agent-relay:8007"
      # Must match the relay's RELAY_SECRET (same dev default).
      AGENT_RELAY_SECRET: ${AGENT_RELAY_SECRET:-dev-relay-secret}
      ADMIN_INTERNAL_TOKEN: ""
      ADMIN_URL: "http://admin:8005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/aigw-runs:/worker-runs
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  identity:
    build:
      context: ../services/identity
    ports:
      - "127.0.0.1:8006:8006"
    environment:
      DATABASE_URL: "postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway"
      REDIS_URL: "redis://redis:6379/0"
      ADMIN_URL: "http://admin:8005"
      # Gates POST /agents/register + DELETE /agents/{slug}. Dev default keeps
      # the stack working; prod sets a real value from Key Vault.
      IDENTITY_SERVICE_TOKEN: ${IDENTITY_SERVICE_TOKEN:-dev-identity-token}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8006/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  librarian:
    build:
      context: ../services/librarian
    ports:
      - "127.0.0.1:8008:8008"
    environment:
      DATABASE_URL: "postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway"
      REDIS_URL: "redis://redis:6379/0"
      # Embeddings route through the gateway's litellm proxy, not a direct
      # provider call. Override EMBEDDING_MODEL to use any embedding model the
      # gateway exposes (see services/litellm/config.yaml).
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-${LITELLM_MASTER_KEY:-sk-litellm-local-dev}}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://litellm:8003/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      AUTH_URL: "http://auth:8001"
      CACHE_URL: "http://cache:8002"
      LIBRARIAN_SERVICE_TOKEN: ""
      CORS_ORIGINS: "*"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8008/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  memory:
    build:
      context: ../services/memory
    ports:
      - "127.0.0.1:8009:8009"
    environment:
      DATABASE_URL: "postgresql://aigateway:aigateway@postgres:5432/aigateway"
      AUTH_URL: "http://auth:8001"
      ADMIN_URL: "http://admin:8005"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-sk-local-placeholder}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-http://ollama:11434/v1}"
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8009/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  claude-sandbox:
    build:
      context: ./claude-sandbox
    profiles: [sandbox]
    ports:
      - "127.0.0.1:2222:22"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: http://cache:8002/anthropic
      GATEWAY_CACHE_URL: http://cache:8002
      GATEWAY_ADMIN_URL: http://admin:8005
    depends_on:
      cache:
        condition: service_healthy
      auth:
        condition: service_healthy
    restart: unless-stopped

  # ── Observability (single-host: logs + metrics for humans + the DevOps agent) ──
  # Open-standard stack: Alloy (OTel-native collector) ingests container logs +
  # host/cAdvisor metrics + (Phase 2) services' OTLP, and exports to standalone
  # Loki + Prometheus; Grafana is the UI. Each backend binds 0.0.0.0 so Alloy
  # pushes work AND the DevOps agent can query LogQL/PromQL directly. Migrating to
  # a company observability portal later = repoint Alloy's exporter (OTLP). Upstream
  # public images — base compose only (NOT in host.yml, NOT in the CI build matrix).
  # No inter-obs service_healthy gating (healthchecks are advisory) — a missing
  # probe tool must never abort a deploy.
  obs-loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "127.0.0.1:3100:3100"   # Loki push + LogQL query
    volumes:
      - obs_loki_data:/loki   # named volume: Docker inits with the image's uid (10001), avoids root-owned bind-mount crash
    restart: unless-stopped

  obs-prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${OBS_PROM_RETENTION:-14d}
      - --web.enable-remote-write-receiver
      - --web.enable-otlp-receiver
    ports:
      - "127.0.0.1:9090:9090"   # Prometheus PromQL query + remote-write/OTLP receiver
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - obs_prometheus_data:/prometheus   # named volume (image uid 65534)
    restart: unless-stopped

  obs-grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: "https://dev.aigw.scdom.net/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - obs_grafana_data:/var/lib/grafana   # named volume (image uid 472)
    depends_on:
      - obs-prometheus
      - obs-loki
    restart: unless-stopped

  obs-alloy:
    image: grafana/alloy:latest
    privileged: true   # cAdvisor needs containerd socket + cgroup access on this VM
    env_file: ../.env  # for LITELLM_MASTER_KEY (litellm /metrics scrape auth)
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "127.0.0.1:12345:12345"   # Alloy UI / debug
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /proc:/proc:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - obs_alloy_data:/var/lib/alloy/data
    depends_on:
      - obs-loki
      - obs-prometheus
    restart: unless-stopped

  # Grafana MCP server — lets MCP-aware agents (Claude Code, the devops agent)
  # query logs/metrics/dashboards as tools. Needs a Grafana service-account token
  # (GRAFANA_SA_TOKEN, from pass aigw/grafana-sa-token) — starts without it but
  # authed calls fail until set. SSE on :8013 (bound to localhost).
  obs-grafana-mcp:
    image: mcp/grafana:latest
    command: ["-t", "sse", "--address", ":8000"]
    ports:
      - "127.0.0.1:8013:8000"
    environment:
      GRAFANA_URL: "http://obs-grafana:3000"
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SA_TOKEN:-}
    depends_on:
      - obs-grafana
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  redis_master_data:
  obs_alloy_data:
  obs_loki_data:
  obs_prometheus_data:
  obs_grafana_data:

networks:
  default:
    name: aigateway
