name: ai-gateway

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aigateway
      POSTGRES_USER: aigateway
      POSTGRES_PASSWORD: aigateway
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack:7.2.0-v14
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  dex:
    image: dexidp/dex:v2.40.0
    ports:
      - "127.0.0.1:5556:5556"
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro
    command: ["dex", "serve", "/etc/dex/config.yaml"]

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama  # opt-in: docker compose --profile ollama up

  # ── AI Gateway services ───────────────────────────────────────────────────────

  db-migrate:
    image: postgres:16
    environment:
      PGPASSWORD: aigateway
    volumes:
      - ./postgres/init.sql:/init.sql:ro
    command: >
      psql -h postgres -U aigateway -d aigateway -f /init.sql
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  litellm:
    build:
      context: ../services/litellm
    ports:
      - "8003:8003"
    env_file: ../.env
    environment:
      # LiteLLM uses Prisma which requires postgresql:// not postgresql+asyncpg://
      DATABASE_URL: "postgresql://aigateway:aigateway@postgres:5432/aigateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health/liveliness')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  auth:
    build:
      context: ../services/auth
    ports:
      - "127.0.0.1:8001:8001"
    env_file: ../.env
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cache:
    build:
      context: ../services/cache
    ports:
      - "8002:8002"
    env_file: ../.env
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal-key}
    depends_on:
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  observability:
    build:
      context: ../services/observability
    ports:
      - "127.0.0.1:8004:8004"
    env_file: ../.env
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal-key}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  admin:
    build:
      context: ../services/admin
    ports:
      - "8005:8005"
    env_file: ../.env
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  claude-sandbox:
    build:
      context: ./claude-sandbox
    profiles: [sandbox]
    ports:
      - "2222:22"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: http://cache:8002/anthropic
      GATEWAY_CACHE_URL: http://cache:8002
      GATEWAY_ADMIN_URL: http://admin:8005
    depends_on:
      cache:
        condition: service_healthy
      auth:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:

networks:
  default:
    name: aigateway
