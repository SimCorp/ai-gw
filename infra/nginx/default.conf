# ── Port manifest ─────────────────────────────────────────────────────────────
# These port numbers are PINNED. They must match the internal container ports
# in infra/docker-compose.yml. Changing a port in either file requires updating
# the other. The host-side ports (what you see in docker-compose `ports:`) may
# differ (e.g. litellm exposes 8003 on both host and container; admin-portal
# maps 3001→3001); what matters here is the container-internal port.
#
#   auth          8001   cache        8002   litellm      8003
#   observability 8004   admin        8005   identity     8006
#   agent-relay   8007   librarian    8008   memory       8009
#   league        8010   admin-portal 3001   portal       3002
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100m;

    # Use Docker's embedded DNS so upstreams are resolved per-request,
    # not at startup — prevents nginx from crashing when a service container
    # hasn't started yet. valid=30s re-resolves on restart/redeploy.
    resolver 127.0.0.11 valid=30s ipv6=off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Landing page ────────────────────────────────────────────────────
    location = / {
        try_files $uri /index.html;
    }

    # ── Convenience redirects — short URLs → portal pages ────────────────
    # Typing localhost:8080/admin or localhost:8080/portal drops you at the
    # right app instead of hitting the API service and getting a 404.
    location = /admin {
        return 301 /admin-portal/admin/dashboard;
    }
    location = /admin/ {
        return 301 /admin-portal/admin/dashboard;
    }
    location = /portal {
        return 301 /portal/portal;
    }

    # ── API services ─────────────────────────────────────────────────────
    # set $upstream BEFORE rewrite — "break" stops all subsequent rewrite-
    # module directives (including set), so $upstream must be initialised first.
    # rewrite strips the /svc/ prefix; proxy_pass uses the rewritten URI.

    location /auth/ {
        set $upstream http://auth:8001;
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    location /cache/ {
        set $upstream http://cache:8002;
        rewrite ^/cache/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    location /litellm/ {
        set $upstream http://litellm:8003;
        rewrite ^/litellm/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    location /observability/ {
        set $upstream http://observability:8004;
        rewrite ^/observability/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        set $upstream http://admin:8005;
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /identity/ {
        set $upstream http://identity:8006;
        rewrite ^/identity/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /agent-relay/ {
        set $upstream http://agent-relay:8007;
        rewrite ^/agent-relay/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /librarian/ {
        set $upstream http://librarian:8008;
        rewrite ^/librarian/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /memory/ {
        set $upstream http://memory:8009;
        rewrite ^/memory/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /league/ {
        set $upstream http://league:8010;
        rewrite ^/league/(.*)$ /$1 break;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Portals (NO rewrite — Next.js basePath keeps the /prefix/) ────────
    location /admin-portal/ {
        set $upstream http://admin-portal:3001;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /portal/ {
        set $upstream http://portal:3002;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
