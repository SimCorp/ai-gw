[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
# E501 (line-too-long) is advisory only — the codebase predates ruff formatting
# and enforcing it now would mean rewrapping ~600 lines across the repo for no
# functional gain. line-length above still drives the formatter.
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Test modules legitimately set up sys.path before importing the service package.
"**/tests/**" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["services"]
addopts = "--import-mode=importlib"

