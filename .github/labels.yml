# Repository labels used by the agentic workflows in .github/workflows/.
# Source of truth. Apply with: scripts/sync-labels.sh (see docs/ops/agentic-workflows.md).
# The agentic workflows can only apply labels that already exist, so this set
# must be synced before the workflows run.

# --- Issue classification (simcorp-issue-triage) ---
- name: bug
  color: d73a4a
  description: Something isn't working
- name: enhancement
  color: a2eeef
  description: New feature or improvement request
- name: question
  color: d876e3
  description: User needs help or information
- name: documentation
  color: 0075ca
  description: Docs are wrong, missing, or unclear
- name: performance
  color: fbca04
  description: Latency, throughput, or cost concern
- name: security
  color: b60205
  description: Potential security concern
- name: duplicate
  color: cfd3d7
  description: Duplicate of another issue
- name: wontfix
  color: ffffff
  description: This will not be worked on
- name: good-first-issue
  color: 7057ff
  description: Clear scope, good entry point for new contributors
- name: needs-triage
  color: ededed
  description: Awaiting triage
- name: needs-info
  color: d4c5f9
  description: Waiting for more information from the reporter
- name: stale
  color: bfbfbf
  description: No activity for 30+ days

# --- PR review (simcorp-pr-review, simcorp-dod-test-check) ---
- name: ai-reviewed
  color: 1d76db
  description: Reviewed by the AI code-review workflow
- name: lgtm
  color: 0e8a16
  description: AI review found no blocking issues
- name: needs-changes
  color: e99695
  description: AI review requested changes
- name: needs-tests
  color: fbca04
  description: New behaviour lacks test coverage
- name: dod-pass
  color: 0e8a16
  description: Definition of Done — test coverage check passed
- name: dod-needs-tests
  color: e99695
  description: Definition of Done — tests missing for new behaviour
- name: dod-exempt
  color: cfd3d7
  description: Definition of Done — intentionally exempt from test check
- name: description-generated
  color: c5def5
  description: PR description generated by the AI workflow

# --- Security scan (simcorp-security-scan) ---
- name: security-reviewed
  color: 0e8a16
  description: Security scan completed, no blocking findings
- name: security-concern
  color: b60205
  description: Security scan flagged a concern
- name: secrets-detected
  color: b60205
  description: Verified secret detected in the diff

# --- CI failure diagnosis (simcorp-run-diagnosis) ---
- name: ci-failure
  color: d73a4a
  description: CI run failed
- name: needs-investigation
  color: fbca04
  description: Requires investigation
- name: automated-diagnosis
  color: ededed
  description: Created by the CI-failure diagnosis workflow

# --- Dependabot triage (simcorp-dependabot-triage) ---
- name: dependencies
  color: 0366d6
  description: Dependency update
- name: major-bump
  color: d73a4a
  description: Crosses a major version
- name: minor-or-patch
  color: c2e0c6
  description: Minor or patch version bump

# --- Automation markers ---
- name: automated
  color: ededed
  description: Opened or maintained by an automated workflow
- name: meta-agent
  color: ededed
  description: Produced by the workflow-health meta-agent
- name: workflow-health
  color: 5319e7
  description: Agentic workflow health report
- name: repo-status
  color: 5319e7
  description: Daily repository status report

