name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

# Cancel in-flight runs for the same ref (saves minutes on fast-moving PRs)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Python lint
  # ────────────────────────────────────────────────────────────────────────────
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install --quiet ruff

      - name: ruff check
        run: ruff check services/

      - name: ruff format --check
        run: ruff format --check services/

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend lint + build (pnpm workspace / turbo)
  # ────────────────────────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint + build (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_ADMIN_API: http://localhost:8005
          NEXT_PUBLIC_ADMIN_BASE_URL: http://localhost:8005
          NEXT_TELEMETRY_DISABLED: "1"

  # ────────────────────────────────────────────────────────────────────────────
  # Unit tests — one job per service to avoid the shared `app` namespace clash
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, cache, observability, admin, librarian, memory, scanner]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install service dev dependencies
        run: pip install --quiet "services/${{ matrix.service }}[dev]"

      - name: Run unit tests
        working-directory: services/${{ matrix.service }}
        env:
          DEV_BYPASS_AUTH: "true"
          BUS_PROVIDER: memory
          DATABASE_URL: postgresql+asyncpg://aigateway:aigateway@localhost:5432/aigateway
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: python3 -m pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # Integration tests — full stack via Docker Compose (no real LLM calls)
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint-python, unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for stack
        run: |
          cat > .env <<'EOF'
          SECRET_KEY=ci-secret-key-not-for-production
          ADMIN_TOKEN=local-dev-admin-key-change-in-prod
          DEV_BYPASS_AUTH=true
          LITELLM_MASTER_KEY=sk-ci-litellm-master-key
          ANTHROPIC_API_KEY=sk-ant-ci-placeholder
          OPENAI_API_KEY=sk-ci-placeholder
          ENVIRONMENT=ci
          # Services read these from .env (compose only sets them explicitly for
          # db-migrate). Without them, auth/cache/etc. fall back to localhost
          # defaults and can't reach Postgres/Redis → /ready 503 → unhealthy.
          DATABASE_URL=postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway
          REDIS_URL=redis://redis:6379/0
          EOF

      - name: Start gateway stack
        # The integration tests exercise the API services only (auth, cache,
        # litellm, observability, admin — see tests/conftest.py). Bring up just
        # those + their deps (postgres, redis, db-migrate) rather than the whole
        # stack, so the dev-only Next.js portal containers (which need a local
        # `pnpm install` not present in CI) don't gate `--wait`. UI/e2e tests
        # (test_e2e_navigation.py) are intentionally not part of this job.
        run: >
          docker compose -f infra/docker-compose.yml up --build --wait --timeout 180
          auth cache litellm observability admin
        env:
          COMPOSE_ANSI: never

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --no-color --tail 100

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # No `cache: pip` here (unlike the unit-test jobs): the stack started
          # above bind-mounts a root-owned data/postgres dir into the workspace,
          # which breaks setup-python's cache directory scan with EACCES.

      - name: Install test dependencies
        run: pip install --quiet -r tests/requirements.txt

      - name: Run integration tests
        run: |
          python3 -m pytest \
            tests/test_smoke.py \
            tests/test_admin.py \
            tests/test_admin_areas.py \
            tests/test_admin_members.py \
            tests/test_admin_policies.py \
            tests/test_admin_budget.py \
            tests/test_admin_guardrails.py \
            tests/test_admin_mcp.py \
            tests/test_admin_plugins.py \
            tests/test_admin_misc.py \
            tests/test_admin_login.py \
            tests/test_portal_api.py \
            -v --tb=short
        env:
          ADMIN_URL: http://localhost:8005
          GATEWAY_URL: http://localhost:8002
          AUTH_URL: http://localhost:8001
          CACHE_URL: http://localhost:8002
          LITELLM_URL: http://localhost:8003
          OBSERVABILITY_URL: http://localhost:8004
          ADMIN_TOKEN: local-dev-admin-key-change-in-prod
          DEV_BYPASS_AUTH: "true"

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --tail=100
        env:
          COMPOSE_ANSI: never

      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
        env:
          COMPOSE_ANSI: never

  # ────────────────────────────────────────────────────────────────────────────
  # Security — dependency CVE scan (pip-audit) + secret scan (gitleaks)
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks scans history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install --quiet pip-audit

      - name: pip-audit (declared deps per service)
        run: |
          set -euo pipefail
          # Advisories with no available fix are allowlisted here with a
          # justification. Populate from the FIRST CI run's findings — do not
          # invent IDs. Format: one --ignore-vuln per advisory.
          IGNORE=(
            # e.g. --ignore-vuln GHSA-xxxx-xxxx-xxxx  # no fixed version yet (dep X)
          )
          fail=0
          for svc in auth cache observability admin librarian memory scanner; do
            echo "::group::pip-audit $svc"
            # Project mode: resolves and audits the service's DECLARED deps from
            # pyproject.toml — not the ambient env / pip-audit's own deps.
            pip-audit "${IGNORE[@]}" "services/$svc" || fail=1
            echo "::endgroup::"
          done
          exit $fail

      - name: gitleaks secret scan
        # Use the OSS gitleaks CLI directly: gitleaks-action@v2 requires a paid
        # GITLEAKS_LICENSE for org-owned repos (SimCorp/ai-gw); the binary does not.
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --redact --no-banner

  # ────────────────────────────────────────────────────────────────────────────
  # Build & push all images to GHCR
  # Only runs on push (not PRs). Uses GitHub Actions cache for layer reuse.
  # ────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push — ${{ matrix.component.name }}
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend, unit-tests, integration-tests]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        component:
          - name: auth
            context: services/auth
          - name: cache
            context: services/cache
          - name: admin-api
            context: services/admin
          - name: observability
            context: services/observability
          - name: identity
            context: services/identity
          - name: agent-relay
            context: services/agent-relay
          - name: librarian
            context: services/librarian
          - name: memory
            context: services/memory
          - name: league
            context: services/league
          - name: scanner
            context: services/scanner
          - name: workflow-worker
            context: services/workflow-worker
          - name: litellm
            context: services/litellm
          # admin-portal / portal are intentionally omitted:
          # this is a pnpm monorepo with workspace:* deps, and their
          # Dockerfiles (npm ci, single-app context) cannot build. Nothing
          # consumes the images today — compose runs the apps via
          # node:20-alpine + npm run dev. Containerize them in a dedicated
          # effort with a proper pnpm-monorepo build.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: docker buildx create --use --name ci-builder

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.component.name }}"
          IMAGE="${IMAGE,,}"  # GHCR requires lowercase repository names
          SHA=$(git rev-parse --short HEAD)
          REF="${{ github.ref_name }}"
          TAGS="${IMAGE}:sha-${SHA},${IMAGE}:${REF}"
          # Add :latest on main/master pushes
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          IFS=',' read -ra TAG_ARGS <<< "${{ steps.tags.outputs.tags }}"
          DOCKER_TAGS=""
          for tag in "${TAG_ARGS[@]}"; do
            DOCKER_TAGS="$DOCKER_TAGS --tag $tag"
          done
          docker buildx build \
            --push \
            $DOCKER_TAGS \
            --cache-from type=gha,scope=${{ matrix.component.name }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.component.name }} \
            ${{ matrix.component.context }}

  # ────────────────────────────────────────────────────────────────────────────
  # Import GHCR images into the private ACR (acraigwdevsdc.azurecr.io).
  #
  # ACR has publicNetworkAccess=Disabled (SimCorp policy). GitHub-hosted runners
  # cannot push via docker directly. `az acr import` is a server-side ARM
  # operation — Azure's ACR service fetches layers from GHCR; the runner only
  # makes an ARM API call, so no VNet runner is needed.
  #
  # Prerequisites (platform-team one-time setup):
  #   1. Create Entra App Registration "ai-gw-github-actions" with a Federated
  #      Credential: subject=repo:SimCorp/ai-gw:ref:refs/heads/master
  #   2. Assign AcrPush on acraigwdevsdc
  #   3. Assign Contributor on rg-aigw-dev-sdc (for deploy.yml phase 4)
  #   4. Add repo secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
  # ────────────────────────────────────────────────────────────────────────────
  acr-import:
    name: Import to ACR
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      id-token: write
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        # azure/login action is blocked by SimCorp org policy (only actions/* allowed).
        # Replicate OIDC login inline: exchange GitHub OIDC token for Azure access.
        run: |
          OIDC_TOKEN=$(curl -sSfL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-token "${OIDC_TOKEN}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Import all images to ACR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse --short HEAD)
          REPO="ghcr.io/${{ github.repository }}"
          REPO="${REPO,,}"
          SERVICES=(auth cache admin-api observability identity agent-relay librarian memory league scanner workflow-worker litellm)
          for svc in "${SERVICES[@]}"; do
            echo "Importing ${svc}:sha-${SHA} → acraigwdevsdc"
            az acr import \
              --name acraigwdevsdc \
              --source "${REPO}/${svc}:sha-${SHA}" \
              --image "${svc}:sha-${SHA}" \
              --image "${svc}:dev-latest" \
              --username "${{ github.actor }}" \
              --password "${GITHUB_TOKEN}" \
              --force
          done
