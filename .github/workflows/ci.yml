name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

# Cancel in-flight runs for the same ref (saves minutes on fast-moving PRs)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Python lint
  # ────────────────────────────────────────────────────────────────────────────
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install --quiet ruff

      - name: ruff check
        run: ruff check services/

      - name: ruff format check
        run: ruff format --check services/

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend lint + build (pnpm workspace / turbo)
  # ────────────────────────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint + build (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_ADMIN_API: http://localhost:8005
          NEXT_PUBLIC_ADMIN_BASE_URL: http://localhost:8005
          NEXT_TELEMETRY_DISABLED: "1"

  # ────────────────────────────────────────────────────────────────────────────
  # Unit tests — one job per service to avoid the shared `app` namespace clash
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, cache, observability, admin]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install service dev dependencies
        run: pip install --quiet "services/${{ matrix.service }}[dev]"

      - name: Run unit tests
        working-directory: services/${{ matrix.service }}
        env:
          DEV_BYPASS_AUTH: "true"
          BUS_PROVIDER: memory
          DATABASE_URL: postgresql+asyncpg://aigateway:aigateway@localhost:5432/aigateway
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: python3 -m pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # Integration tests — full stack via Docker Compose (no real LLM calls)
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint-python, unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for stack
        run: |
          cat > .env <<'EOF'
          SECRET_KEY=ci-secret-key-not-for-production
          ADMIN_TOKEN=local-dev-admin-key-change-in-prod
          DEV_BYPASS_AUTH=true
          LITELLM_MASTER_KEY=sk-ci-litellm-master-key
          ANTHROPIC_API_KEY=sk-ant-ci-placeholder
          OPENAI_API_KEY=sk-ci-placeholder
          ENVIRONMENT=ci
          EOF

      - name: Start gateway stack
        run: docker compose -f infra/docker-compose.yml up --build --wait --timeout 180
        env:
          COMPOSE_ANSI: never

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install --quiet -r tests/requirements.txt

      - name: Run integration tests
        run: |
          python3 -m pytest \
            tests/test_smoke.py \
            tests/test_admin.py \
            tests/test_admin_areas.py \
            tests/test_admin_members.py \
            tests/test_admin_policies.py \
            tests/test_admin_budget.py \
            tests/test_admin_guardrails.py \
            tests/test_admin_mcp.py \
            tests/test_admin_plugins.py \
            tests/test_admin_misc.py \
            tests/test_admin_login.py \
            tests/test_portal_api.py \
            -v --tb=short
        env:
          ADMIN_URL: http://localhost:8005
          GATEWAY_URL: http://localhost:8002
          AUTH_URL: http://localhost:8001
          CACHE_URL: http://localhost:8002
          LITELLM_URL: http://localhost:8003
          OBSERVABILITY_URL: http://localhost:8004
          ADMIN_TOKEN: local-dev-admin-key-change-in-prod
          DEV_BYPASS_AUTH: "true"

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --tail=100
        env:
          COMPOSE_ANSI: never

      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
        env:
          COMPOSE_ANSI: never

  # ────────────────────────────────────────────────────────────────────────────
  # Build & push all images to GHCR
  # Only runs on push (not PRs). Uses GitHub Actions cache for layer reuse.
  # ────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push — ${{ matrix.component.name }}
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend, unit-tests, integration-tests]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        component:
          - name: auth
            context: services/auth
          - name: cache
            context: services/cache
          - name: admin-api
            context: services/admin
          - name: observability
            context: services/observability
          - name: admin-frontend
            context: apps/admin
          - name: portal-frontend
            context: apps/portal

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}
