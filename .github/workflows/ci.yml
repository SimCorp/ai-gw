name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/dependabot.yml"
  pull_request:
    branches: [main, master]
    # No paths-ignore here on purpose: a workflow skipped via path filtering leaves
    # its required status checks stuck "Pending" and blocks the PR. Instead the
    # `changes` job below detects doc-only PRs and the heavy jobs skip via `if:` —
    # a conditionally-skipped job reports "Success", so required checks still pass.

# Cancel in-flight runs for the same ref (saves minutes on fast-moving PRs)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Detect whether a PR touches anything other than docs. Heavy jobs gate on this
  # so doc-only PRs skip CI (and, since they skip via `if:`, their required checks
  # still report "Success" and the PR stays mergeable — no admin override needed).
  # On push/tag events there is no PR diff, so this always reports code=true.
  # ────────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect non-doc changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE:-}" ]; then
            echo "Not a pull_request event — running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Three-dot (merge-base) diff matches GitHub's PR file-list semantics, so
          # base-branch commits made after this PR branched don't leak into the diff.
          files="$(git diff --name-only "$BASE...$HEAD")"
          printf 'Changed files:\n%s\n' "$files"
          # Patterns mirror the push trigger's paths-ignore. Any file that is not
          # doc-ish flips code=true, so a mixed code+docs PR runs full CI.
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|docs/*|.github/dependabot.yml) : ;;
              *) code=true ;;
            esac
          done <<< "$files"
          echo "Non-doc changes present: $code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # Python lint
  # ────────────────────────────────────────────────────────────────────────────
  lint-python:
    name: Lint (Python)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install --quiet ruff

      - name: ruff check
        run: ruff check services/

      - name: ruff format --check
        run: ruff format --check services/

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend lint + build (pnpm workspace / turbo)
  # ────────────────────────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint + build (frontend)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_ADMIN_API: https://dev.aigw.scdom.net/api/admin
          NEXT_PUBLIC_ADMIN_BASE_URL: https://dev.aigw.scdom.net/api/admin
          NEXT_TELEMETRY_DISABLED: "1"

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend unit tests (Vitest via turbo)
  # ────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Unit tests (frontend)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # ────────────────────────────────────────────────────────────────────────────
  # Unit tests — one job per service to avoid the shared `app` namespace clash
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests — ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, cache, observability, admin, identity, agent-relay, league, librarian, memory, scanner, workflow-worker, graphify]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install service dev dependencies
        run: pip install --quiet "services/${{ matrix.service }}[dev]"

      - name: Run unit tests
        working-directory: services/${{ matrix.service }}
        # Each service's conftest sets the env it needs (config is fail-fast with no
        # local defaults). BUS_PROVIDER=memory keeps observability off Service Bus.
        env:
          BUS_PROVIDER: memory
          ENVIRONMENT: test
        run: python3 -m pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # Security — dependency CVE scan (pip-audit) + secret scan (gitleaks)
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: Security scan
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks scans history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install --quiet pip-audit

      - name: pip-audit (declared deps per service)
        run: |
          set -euo pipefail
          # Advisories with no available fix are allowlisted here with a
          # justification. Populate from the FIRST CI run's findings — do not
          # invent IDs. Format: one --ignore-vuln per advisory.
          IGNORE=(
            # e.g. --ignore-vuln GHSA-xxxx-xxxx-xxxx  # no fixed version yet (dep X)
          )
          fail=0
          for svc in auth cache observability admin librarian memory scanner identity agent-relay league workflow-worker graphify; do
            echo "::group::pip-audit $svc"
            # Project mode: resolves and audits the service's DECLARED deps from
            # pyproject.toml — not the ambient env / pip-audit's own deps.
            pip-audit "${IGNORE[@]}" "services/$svc" || fail=1
            echo "::endgroup::"
          done
          exit $fail

      - name: gitleaks secret scan
        # Use the OSS gitleaks CLI directly: gitleaks-action@v2 requires a paid
        # GITLEAKS_LICENSE for org-owned repos (SimCorp/ai-gw); the binary does not.
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --redact --no-banner

  # ────────────────────────────────────────────────────────────────────────────
  # Dependency review — flags PRs that introduce known-vulnerable dependencies.
  # Advisory: not a required status check, so it never blocks a merge (yet); it
  # surfaces high-severity vulns with a PR comment. Promote to a required gate by
  # adding "Dependency review" to the branch ruleset's required_status_checks.
  # ────────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency review
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # ────────────────────────────────────────────────────────────────────────────
  # Build & push all images to GHCR
  # Only runs on push (not PRs). Uses GitHub Actions cache for layer reuse.
  # ────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push — ${{ matrix.component.name }}
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend, test-frontend, unit-tests]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        component:
          - name: auth
            context: services/auth
          - name: cache
            context: services/cache
          - name: admin-api
            context: services/admin
          - name: observability
            context: services/observability
          - name: identity
            context: services/identity
          - name: agent-relay
            context: services/agent-relay
          - name: librarian
            context: services/librarian
          - name: memory
            context: services/memory
          - name: league
            context: services/league
          - name: scanner
            context: services/scanner
          - name: workflow-worker
            context: services/workflow-worker
          - name: graphify
            context: services/graphify
          - name: litellm
            context: services/litellm
          # Next.js portals: pnpm-monorepo Dockerfiles at repo root, root build
          # context. NEXT_PUBLIC_* are baked at build time → passed as build-args
          # pointing at the gateway dev FQDN. (NEXT_PUBLIC_LITELLM_KEY is left
          # unset on purpose — never bake a provider key into a browser bundle.)
          - name: admin-portal
            context: .
            dockerfile: Dockerfile.admin
            build_args: >-
              --build-arg NEXT_PUBLIC_ADMIN_API=https://dev.aigw.scdom.net/api/admin
              --build-arg NEXT_PUBLIC_LEAGUE_API=https://dev.aigw.scdom.net/api/league
          - name: portal
            context: .
            dockerfile: Dockerfile.portal
            build_args: >-
              --build-arg NEXT_PUBLIC_ADMIN_BASE_URL=https://dev.aigw.scdom.net/api/admin
              --build-arg NEXT_PUBLIC_CACHE_BASE_URL=https://dev.aigw.scdom.net/api/cache
              --build-arg NEXT_PUBLIC_IDENTITY_BASE_URL=https://dev.aigw.scdom.net/api/identity
              --build-arg NEXT_PUBLIC_LIBRARIAN_BASE_URL=https://dev.aigw.scdom.net/api/librarian
              --build-arg NEXT_PUBLIC_MEMORY_BASE_URL=https://dev.aigw.scdom.net/api/memory
              --build-arg NEXT_PUBLIC_LITELLM_BASE_URL=https://dev.aigw.scdom.net/api/litellm
              --build-arg NEXT_PUBLIC_LEAGUE_API=https://dev.aigw.scdom.net/api/league

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: docker buildx create --use --name ci-builder

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.component.name }}"
          IMAGE="${IMAGE,,}"  # GHCR requires lowercase repository names
          SHA=$(git rev-parse --short HEAD)
          REF="${{ github.ref_name }}"
          TAGS="${IMAGE}:sha-${SHA},${IMAGE}:${REF}"
          # Add :latest on main/master pushes
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          IFS=',' read -ra TAG_ARGS <<< "${{ steps.tags.outputs.tags }}"
          DOCKER_TAGS=""
          for tag in "${TAG_ARGS[@]}"; do
            DOCKER_TAGS="$DOCKER_TAGS --tag $tag"
          done
          DF_FLAG=""
          if [ -n "${{ matrix.component.dockerfile }}" ]; then
            DF_FLAG="-f ${{ matrix.component.dockerfile }}"
          fi
          for attempt in 1 2 3; do
            if docker buildx build \
              --push \
              $DOCKER_TAGS \
              $DF_FLAG \
              ${{ matrix.component.build_args }} \
              --cache-from type=gha,scope=${{ matrix.component.name }} \
              --cache-to type=gha,mode=max,scope=${{ matrix.component.name }} \
              ${{ matrix.component.context }}; then
              exit 0
            fi
            echo "Build attempt ${attempt}/3 failed"
            [[ ${attempt} -lt 3 ]] && sleep 15
          done
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # Portal images for test environment — built only on version tag pushes.
  # NEXT_PUBLIC_* vars are baked at build time so we need env-specific images.
  # Images: admin-portal-test, portal-test (separate from the dev portal builds
  # in build-push above). Deploy-test references these by sha-{sha} tag.
  # ────────────────────────────────────────────────────────────────────────────
  build-portals-test:
    name: Build portal images (test)
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend, test-frontend, unit-tests]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: docker buildx create --use --name ci-builder

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          REPO="${REPO,,}"
          SHA=$(git rev-parse --short HEAD)
          REF="${{ github.ref_name }}"
          echo "admin_portal_tags=${REPO}/admin-portal-test:sha-${SHA},${REPO}/admin-portal-test:${REF}" >> $GITHUB_OUTPUT
          echo "portal_tags=${REPO}/portal-test:sha-${SHA},${REPO}/portal-test:${REF}" >> $GITHUB_OUTPUT

      - name: Build and push admin-portal-test
        run: |
          IFS=',' read -ra TAG_ARGS <<< "${{ steps.tags.outputs.admin_portal_tags }}"
          DOCKER_TAGS=""
          for tag in "${TAG_ARGS[@]}"; do
            DOCKER_TAGS="$DOCKER_TAGS --tag $tag"
          done
          for attempt in 1 2 3; do
            if docker buildx build \
              --push \
              $DOCKER_TAGS \
              -f Dockerfile.admin \
              --build-arg NEXT_PUBLIC_ADMIN_API=https://aigw-test.lab.cloud.scdom.net/api/admin \
              --cache-from type=gha,scope=admin-portal-test \
              --cache-to type=gha,mode=max,scope=admin-portal-test \
              .; then
              exit 0
            fi
            echo "Build attempt ${attempt}/3 failed"
            [[ ${attempt} -lt 3 ]] && sleep 15
          done
          exit 1

      - name: Build and push portal-test
        run: |
          IFS=',' read -ra TAG_ARGS <<< "${{ steps.tags.outputs.portal_tags }}"
          DOCKER_TAGS=""
          for tag in "${TAG_ARGS[@]}"; do
            DOCKER_TAGS="$DOCKER_TAGS --tag $tag"
          done
          for attempt in 1 2 3; do
            if docker buildx build \
              --push \
              $DOCKER_TAGS \
              -f Dockerfile.portal \
              --build-arg NEXT_PUBLIC_ADMIN_BASE_URL=https://aigw-test.lab.cloud.scdom.net/api/admin \
              --build-arg NEXT_PUBLIC_CACHE_BASE_URL=https://aigw-test.lab.cloud.scdom.net/api/cache \
              --build-arg NEXT_PUBLIC_IDENTITY_BASE_URL=https://aigw-test.lab.cloud.scdom.net/api/identity \
              --build-arg NEXT_PUBLIC_LIBRARIAN_BASE_URL=https://aigw-test.lab.cloud.scdom.net/api/librarian \
              --build-arg NEXT_PUBLIC_MEMORY_BASE_URL=https://aigw-test.lab.cloud.scdom.net/api/memory \
              --build-arg NEXT_PUBLIC_LITELLM_BASE_URL=https://aigw-test.lab.cloud.scdom.net/api/litellm \
              --cache-from type=gha,scope=portal-test \
              --cache-to type=gha,mode=max,scope=portal-test \
              .; then
              exit 0
            fi
            echo "Build attempt ${attempt}/3 failed"
            [[ ${attempt} -lt 3 ]] && sleep 15
          done
          exit 1
