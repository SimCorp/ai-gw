name: E2E quality walkthrough

# Browser E2E quality/smoke walkthrough of the dev + admin portals.
#
# This is NOT a CI merge gate — it is intentionally absent from any `needs:`
# chain in ci.yml. It targets a DEPLOYED environment that is only reachable
# in-VNet / over ZPA, so it requires a self-hosted runner labelled
# `vnet-aigw-dev`. It stays DORMANT until that runner exists AND the repo
# variable `E2E_ENABLED` is set to `true` (so scheduled runs don't queue
# forever against a non-existent runner). Mirrors the archived `e2e-test` job.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target gateway base URL"
        required: false
        default: "https://dev.aigw.scdom.net"
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC

permissions:
  contents: read

concurrency:
  group: e2e-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  walkthrough:
    name: Portal walkthrough
    # Dormant until enabled (set repo variable E2E_ENABLED=true once the runner exists).
    if: vars.E2E_ENABLED == 'true'
    runs-on: [self-hosted, vnet-aigw-dev]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install e2e deps (standalone — ignore the repo workspace)
        working-directory: e2e
        run: |
          pnpm install --ignore-workspace
          pnpm exec playwright install --with-deps chromium

      - name: Run walkthrough
        working-directory: e2e
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://dev.aigw.scdom.net' }}
          E2E_DEV_EMAIL: ${{ secrets.E2E_DEV_EMAIL }}
          E2E_DEV_PW: ${{ secrets.E2E_DEV_PW }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PW: ${{ secrets.E2E_ADMIN_PW }}
        run: pnpm exec playwright test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/results.json
          retention-days: 14
