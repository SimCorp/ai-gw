name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    branches: [master, main]
    types: [completed]

# Prevent concurrent deploys to dev
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure login (OIDC)
        # azure/login action is blocked by SimCorp org policy (only actions/* allowed).
        # Replicate OIDC login inline: exchange GitHub OIDC token for Azure access.
        run: |
          OIDC_TOKEN=$(curl -sSfL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-token "${OIDC_TOKEN}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Resolve runtime values
        id: resolve
        run: |
          SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          ACA_ENV_ID=$(az containerapp env show \
            --name cae-aigw-dev-sdc \
            --resource-group rg-aigw-dev-sdc \
            --query id -o tsv | tr -d '\r')
          KV_URI=$(az keyvault show \
            --name kv-aigw-dev-sdc \
            --resource-group rg-aigw-dev-sdc \
            --query properties.vaultUri -o tsv | tr -d '\r')
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"
          echo "acaEnvId=${ACA_ENV_ID}" >> "${GITHUB_OUTPUT}"
          echo "kvUri=${KV_URI}" >> "${GITHUB_OUTPUT}"

      - name: Deploy container apps
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          az deployment group create \
            --resource-group rg-aigw-dev-sdc \
            --template-file infra/bicep/modules/containerApps.bicep \
            --parameters \
                env=dev \
                "acaEnvId=${{ steps.resolve.outputs.acaEnvId }}" \
                "kvUri=${{ steps.resolve.outputs.kvUri }}" \
                kvName=kv-aigw-dev-sdc \
                acrName=acraigwdevsdc \
                "ghcrPat=${GHCR_PAT}" \
                "ghcrUsername=${{ github.actor }}" \
                "imageTag=sha-${{ steps.resolve.outputs.sha }}" \
                location=swedencentral \
            --name "container-apps-$(date +%Y%m%d%H%M)"

      - name: Run DB migrations
        run: |
          EXEC_NAME=$(az containerapp job start \
            --name job-db-migrate-dev-sdc \
            --resource-group rg-aigw-dev-sdc \
            --query name -o tsv | tr -d '\r')
          echo "Started migration job execution: ${EXEC_NAME}"

          # Poll until Succeeded or Failed (max 5 min)
          for i in $(seq 1 30); do
            STATUS=$(az containerapp job execution show \
              --name job-db-migrate-dev-sdc \
              --resource-group rg-aigw-dev-sdc \
              --job-execution-name "${EXEC_NAME}" \
              --query properties.status -o tsv 2>/dev/null | tr -d '\r')
            echo "Migration status (${i}/30): ${STATUS}"
            [[ "${STATUS}" == "Succeeded" ]] && { echo "Migrations complete"; exit 0; }
            [[ "${STATUS}" == "Failed" ]] && { echo "ERROR: Migrations failed"; exit 1; }
            sleep 10
          done
          echo "ERROR: Migration timed out after 5 minutes"
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # Smoke test (control plane) — verify every Container App rolled out healthy.
  # Runs from a GitHub-hosted runner via the Azure control plane (no VNet needed).
  # ────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test (control plane)
    needs: deploy-dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC)
        run: |
          OIDC_TOKEN=$(curl -sSfL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-token "${OIDC_TOKEN}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Verify all container apps are Running
        run: |
          set -euo pipefail
          RG=rg-aigw-dev-sdc
          APPS=(ca-auth ca-cache ca-litellm ca-observability ca-admin ca-identity \
                ca-agent-relay ca-librarian ca-memory ca-league ca-scanner \
                ca-workflow-worker ca-admin-portal ca-portal)
          fail=0
          for app in "${APPS[@]}"; do
            name="${app}-dev-sdc"
            STATE=$(az containerapp show -n "$name" -g "$RG" \
              --query "properties.runningStatus" -o tsv 2>/dev/null | tr -d '\r' || echo "Missing")
            echo "${name}: ${STATE}"
            if [[ "$STATE" != "Running" ]]; then
              echo "::error::${name} is not Running (state: ${STATE})"
              fail=1
            fi
          done
          exit $fail

  # ────────────────────────────────────────────────────────────────────────────
  # E2E smoke (data plane) — real HTTP health + functional path against the
  # gateway FQDN. The ACA environment is internal:true, so this MUST run from a
  # VNet-connected self-hosted runner in the Landing Zone. Disabled (`if: false`)
  # until that runner is registered — see plan Workstream H. Flip `if:` to
  # `github.event.workflow_run.conclusion == 'success'` to enable.
  # ────────────────────────────────────────────────────────────────────────────
  e2e-test:
    name: E2E smoke (data plane)
    needs: smoke-test
    if: false  # TODO(Workstream H): enable once a VNet-connected self-hosted runner exists
    runs-on: [self-hosted, vnet-aigw-dev]
    steps:
      - uses: actions/checkout@v4

      - name: Gateway health checks
        run: |
          set -euo pipefail
          BASE=https://aigw-dev.lab.cloud.scdom.net
          for path in /auth/health /cache/health /admin/health; do
            code=$(curl -fsS -o /dev/null -w '%{http_code}' "${BASE}${path}")
            echo "${path}: ${code}"
            [[ "$code" == "200" ]] || { echo "::error::${path} returned ${code}"; exit 1; }
          done

      - name: End-to-end inference path
        env:
          ADMIN_TOKEN: ${{ secrets.AIGW_ADMIN_TOKEN }}
        run: |
          # Full functional path (plan Workstream F / design §9 Phase 5):
          # register a team -> issue an sk-* API key -> chat completion through the
          # gateway -> assert a cache hit on the second identical call + a cost row
          # recorded in Postgres. Implemented with the E2E rollout once the VNet
          # runner is available; the health checks above already gate basic liveness.
          echo "E2E functional flow runs here once the VNet runner is available."
