name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    branches: [master, main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234 or latest)'
        required: false
        default: 'latest'

# Prevent concurrent deploys to dev
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: [self-hosted, vnet-aigw-dev]
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Azure login (OIDC)
        # azure/login action is blocked by SimCorp org policy (only actions/* allowed).
        # Replicate OIDC login inline: exchange GitHub OIDC token for Azure access.
        run: |
          OIDC_TOKEN=$(curl -sSfL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-token "${OIDC_TOKEN}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Compute IMAGE_TAG
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            IMAGE_TAG="sha-${SHA}"
          fi
          echo "imageTag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Update repo on runner
        run: |
          cd /opt/aigw && git fetch origin && git checkout master && git pull

      - name: Pull images
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.imageTag }} \
            docker compose -f infra/docker-compose.yml pull

      - name: Deploy services
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.imageTag }} \
            docker compose -f infra/docker-compose.yml up -d

      - name: Run DB migrations
        run: |
          docker compose -f infra/docker-compose.yml run --rm db-migrate

      - name: Health check
        run: |
          set -euo pipefail
          BASE=http://localhost:8080
          fail=0
          for path in /healthz /auth/health /admin/health; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE$path" 2>/dev/null || echo "000")
            echo "$path → $STATUS"
            if [[ "$STATUS" != "200" ]]; then
              echo "::warning::$path returned $STATUS"
              fail=1
            fi
          done
          exit $fail

  # ────────────────────────────────────────────────────────────────────────────
  # E2E smoke (data plane). Runs on the same VNet-connected self-hosted runner,
  # which has direct reach to the deployed services. The verify_internal_access.py
  # script drives the Caddy front-door through browser and agent inference paths.
  # ────────────────────────────────────────────────────────────────────────────
  e2e-test:
    name: E2E smoke (data plane)
    needs: deploy-dev
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, vnet-aigw-dev]
    permissions:
      id-token: write
      contents: read
    env:
      GATEWAY_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Run E2E verification
        env:
          AIGW_TEST_API_KEY: ${{ secrets.AIGW_TEST_API_KEY }}
        run: python3 scripts/verify_internal_access.py
