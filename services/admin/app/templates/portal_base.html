<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI Gateway — Developer Portal{% endblock %}</title>
  <link href="/static/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --accent: #6366f1; --accent-dark: #4f46e5; }
    body { background: #f8fafc; font-size: .9rem; }
    .portal-nav {
      background: #0f172a;
      padding: .75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .portal-nav .brand {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .portal-nav .brand .badge-env {
      font-size: .6rem;
      background: var(--accent);
      color: #fff;
      padding: .15rem .4rem;
      border-radius: 4px;
    }
    .portal-nav a.nav-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: .85rem;
      padding: .25rem .1rem;
    }
    .portal-nav a.nav-link:hover, .portal-nav a.nav-link.active { color: #fff; }
    .portal-nav .nav-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
    .portal-nav .user-email { color: #64748b; font-size: .8rem; }
    .content { padding: 2rem; max-width: 1100px; margin: 0 auto; }
    .card { border: 1px solid #e2e8f0; border-radius: 10px; box-shadow: none; }
    .card-header { background: #fff; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
    .stat-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1.25rem 1.5rem; }
    .stat-label { font-size: .75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: #0f172a; line-height: 1.2; margin-top: .2rem; }
    .stat-sub { font-size: .75rem; color: #94a3b8; margin-top: .25rem; }
    .btn-primary { background: var(--accent); border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    .table { font-size: .875rem; }
    .table thead th { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #64748b; background: #f8fafc; border-bottom-width: 1px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 1rem 1.25rem; border-radius: 8px; font-size: .82rem; overflow-x: auto; }
    code.inline { background: #f1f5f9; padding: .15rem .4rem; border-radius: 4px; color: #0f172a; font-size: .82rem; }
    .tab-content pre { margin: 0; border-radius: 0 0 8px 8px; }
    .nav-tabs .nav-link { font-size: .85rem; }
    .copy-btn { font-size: .75rem; }
    .key-reveal { font-family: monospace; font-size: .85rem; background: #f0fdf4; border: 1px solid #bbf7d0; padding: .75rem 1rem; border-radius: 8px; word-break: break-all; }
    .guide-section { margin-bottom: 2.5rem; }
    .guide-section h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 1px solid #e2e8f0; }
    .pitfall { background: #fff7ed; border-left: 3px solid #f97316; padding: .75rem 1rem; border-radius: 0 6px 6px 0; margin-bottom: .5rem; font-size: .85rem; }
    .pitfall strong { color: #c2410c; }
  </style>
</head>
<body>

<nav class="portal-nav">
  <a href="/portal/dashboard" class="brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    AI Gateway
    <span class="badge-env">Dev Portal</span>
  </a>
  {% if dev %}
  <a href="/portal/dashboard" class="nav-link {% if request.url.path == '/portal/dashboard' %}active{% endif %}">Dashboard</a>
  <a href="/portal/keys" class="nav-link {% if '/portal/keys' in request.url.path %}active{% endif %}">My Keys</a>
  <a href="/portal/quickstart" class="nav-link {% if '/portal/quickstart' in request.url.path %}active{% endif %}">Quick Start</a>
  <a href="/portal/guides/agents" class="nav-link {% if '/portal/guides' in request.url.path %}active{% endif %}">Agent Integration</a>
  <a href="/portal/usage" class="nav-link {% if '/portal/usage' in request.url.path %}active{% endif %}">Usage</a>
  <a href="/portal/teams" class="nav-link {% if '/portal/teams' in request.url.path %}active{% endif %}">Teams</a>
  <div class="nav-right">
    <span class="user-email">{{ dev.email }}</span>
    <form method="post" action="/portal/logout" style="margin:0">
      <button type="submit" class="btn btn-sm btn-outline-secondary" style="font-size:.75rem;color:#94a3b8;border-color:#334155">Sign out</button>
    </form>
  </div>
  {% endif %}
</nav>

<div class="content">
  {% block content %}{% endblock %}
</div>

<script src="/static/bootstrap.bundle.min.js"></script>
<script>
function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
