<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI Gateway Admin{% endblock %}</title>
  <link href="/static/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --sidebar-w: 240px;
      --sidebar-bg: #0f172a;
      --sidebar-hover: #1e293b;
      --accent: #6366f1;
      --accent-light: #818cf8;
    }
    body { background: #f8fafc; font-size: .9rem; }
    #sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--sidebar-bg);
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      padding: 0;
      z-index: 100;
    }
    #sidebar .brand {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: .6rem;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
    }
    #sidebar .brand span.badge-env {
      font-size: .6rem;
      background: var(--accent);
      color: #fff;
      padding: .15rem .4rem;
      border-radius: 4px;
      font-weight: 500;
      letter-spacing: .02em;
    }
    #sidebar nav { padding: 1rem .75rem; flex: 1; }
    #sidebar .nav-section {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .1em;
      color: #475569;
      text-transform: uppercase;
      padding: .75rem .75rem .25rem;
    }
    #sidebar a.nav-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .5rem .75rem;
      border-radius: 6px;
      color: #94a3b8;
      text-decoration: none;
      font-size: .875rem;
      transition: background .15s, color .15s;
      margin-bottom: .1rem;
    }
    #sidebar a.nav-item:hover, #sidebar a.nav-item.active {
      background: var(--sidebar-hover);
      color: #fff;
    }
    #sidebar a.nav-item.active { color: var(--accent-light); }
    #sidebar a.nav-item svg { opacity: .7; flex-shrink: 0; }
    #sidebar a.nav-item.active svg { opacity: 1; }
    #main { margin-left: var(--sidebar-w); min-height: 100vh; }
    #topbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: .875rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    #topbar h1 { font-size: 1.1rem; font-weight: 600; color: #0f172a; margin: 0; }
    #topbar .breadcrumb { margin: 0; font-size: .8rem; }
    .content { padding: 1.75rem; }
    .stat-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }
    .stat-card .stat-label { font-size: .75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
    .stat-card .stat-value { font-size: 1.75rem; font-weight: 700; color: #0f172a; line-height: 1.2; margin-top: .2rem; }
    .stat-card .stat-sub { font-size: .75rem; color: #94a3b8; margin-top: .25rem; }
    .card { border: 1px solid #e2e8f0; border-radius: 10px; box-shadow: none; }
    .card-header { background: #fff; border-bottom: 1px solid #e2e8f0; font-weight: 600; font-size: .9rem; }
    .table { font-size: .875rem; }
    .table thead th { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #64748b; border-bottom-width: 1px; background: #f8fafc; }
    .badge-active { background: #dcfce7; color: #166534; font-size: .7rem; }
    .badge-revoked { background: #fee2e2; color: #991b1b; font-size: .7rem; }
    .btn-primary { background: var(--accent); border-color: var(--accent); }
    .btn-primary:hover { background: #4f46e5; border-color: #4f46e5; }
    .btn-outline-primary { color: var(--accent); border-color: var(--accent); }
    .btn-outline-primary:hover { background: var(--accent); border-color: var(--accent); }
    .form-control:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 .2rem rgba(99,102,241,.2); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: #94a3b8; }
    .empty-state svg { opacity: .3; margin-bottom: 1rem; }
    code.key-display { font-size: .8rem; background: #f1f5f9; padding: .25rem .5rem; border-radius: 4px; color: #0f172a; }
    .alert-success-soft { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; border-radius: 8px; padding: .75rem 1rem; }
    .spinner-sm { width: 1rem; height: 1rem; }
  </style>
</head>
<body>

<div id="sidebar">
  <a href="/" class="brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    AI Gateway
    <span class="badge-env">Admin</span>
  </a>
  <nav>
    <div class="nav-section">Overview</div>
    <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/system/health/ui" class="nav-item {% if '/system' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      System Health
    </a>

    <div class="nav-section">Management</div>
    <a href="/ui/teams" class="nav-item {% if '/ui/teams' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Teams
    </a>
    <a href="/ui/api-keys" class="nav-item {% if '/ui/api-keys' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      API Keys
    </a>
    <a href="/ui/audit-log" class="nav-item {% if '/ui/audit' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Audit Log
    </a>

    <div class="nav-section">Configuration</div>
    <a href="/ui/settings" class="nav-item {% if '/ui/settings' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14M12 2v2m0 16v2M2 12h2m16 0h2"/></svg>
      Provider Keys
    </a>
    <a href="/ui/models" class="nav-item {% if '/ui/models' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
      Model Registry
    </a>
    <a href="/ui/pricing" class="nav-item {% if '/ui/pricing' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Pricing
    </a>
  </nav>

  <div style="padding: .75rem 1.5rem 1rem; border-top: 1px solid #1e293b; font-size: .7rem; color: #475569;">
    <a href="/docs" target="_blank" style="color: #475569; text-decoration: none;">API Docs ↗</a>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <h1>{% block page_title %}{% endblock %}</h1>
    <div class="d-flex align-items-center gap-3">
      {% block topbar_actions %}{% endblock %}
    </div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

<script src="/static/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
