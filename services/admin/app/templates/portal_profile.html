{% extends "portal_base.html" %}
{% block title %}Profile — AI Gateway Dev Portal{% endblock %}

{% block content %}
<div class="mb-4">
  <h2 class="fw-bold mb-1" style="font-size:1.4rem">My Profile</h2>
</div>

{% if saved %}
<div class="alert alert-success py-2 small mb-4">Profile updated successfully.</div>
{% endif %}
{% if error is defined and error %}
<div class="alert alert-danger py-2 small mb-4">{{ error }}</div>
{% endif %}

<div class="row g-4">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header py-2 px-3">Account details</div>
      <div class="card-body">
        <form method="post" action="/portal/profile">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Email</label>
            <input type="text" class="form-control" value="{{ dev.email }}" disabled>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-semibold">Display name</label>
            <input type="text" name="display_name" class="form-control" value="{{ dev.display_name or '' }}" placeholder="Your name">
          </div>
          <button type="submit" class="btn btn-primary btn-sm">Save changes</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card">
      <div class="card-header py-2 px-3">Change password</div>
      <div class="card-body">
        <form method="post" action="/portal/profile">
          <input type="hidden" name="display_name" value="">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Current password</label>
            <input type="password" name="current_password" class="form-control" placeholder="••••••••">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">New password</label>
            <input type="password" name="new_password" class="form-control" placeholder="Minimum 8 characters">
          </div>
          <div class="mb-4">
            <label class="form-label small fw-semibold">Confirm new password</label>
            <input type="password" name="new_password2" class="form-control" placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-outline-primary btn-sm">Update password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
