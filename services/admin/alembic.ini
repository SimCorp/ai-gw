# Alembic config for the admin service.
# The runtime app uses an async engine (postgresql+asyncpg); migrations use
# the same URL but env.py rewrites it to a sync driver (psycopg2) because
# Alembic's operations are synchronous. Override DATABASE_URL via env var.

[alembic]
script_location = migrations
# Use rev_id strings (slug) so versions read like 0001_baseline.py
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is read by env.py from DATABASE_URL env var; this is a placeholder
sqlalchemy.url = postgresql+asyncpg://aigateway:aigateway@postgres:5432/aigateway

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
