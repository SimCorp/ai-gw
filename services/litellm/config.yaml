model_list:
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: github-gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: https://models.inference.ai.azure.com
      api_key: os.environ/GITHUB_MODELS_API_KEY

  - model_name: local
    litellm_params:
      model: ollama/llama3.2
      api_base: http://ollama:11434

  # GitHub Copilot (requires GITHUB_COPILOT_TOKEN — PAT with Copilot access)
  - model_name: copilot-gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  - model_name: copilot-gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  - model_name: copilot-o3-mini
    litellm_params:
      model: openai/o3-mini
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  - model_name: copilot-claude-3.5-sonnet
    litellm_params:
      model: openai/claude-3.5-sonnet   # Copilot exposes it via OpenAI-compat API
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  # ── Azure OpenAI (Azure AI Foundry — OpenAI models) ────────────────────────
  # Requires: AZURE_API_BASE, AZURE_API_KEY, AZURE_API_VERSION in .env
  - model_name: azure-gpt-4o
    litellm_params:
      model: azure/gpt-4o
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  - model_name: azure-gpt-4o-mini
    litellm_params:
      model: azure/gpt-4o-mini
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  - model_name: azure-o3-mini
    litellm_params:
      model: azure/o3-mini
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  - model_name: azure-gpt-4.1
    litellm_params:
      model: azure/gpt-4.1
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  # ── Azure AI Foundry — Microsoft Phi ────────────────────────────────────────
  # Serverless inference via Azure AI Services unified endpoint.
  # Requires: AZURE_AI_FOUNDRY_ENDPOINT, AZURE_AI_FOUNDRY_KEY in .env
  # Get these from: Azure AI Foundry portal → your project → Overview → Endpoints
  - model_name: phi-4
    litellm_params:
      model: azure_ai/Phi-4
      api_base: os.environ/AZURE_AI_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_AI_FOUNDRY_KEY

  - model_name: phi-4-mini
    litellm_params:
      model: azure_ai/Phi-4-mini-instruct
      api_base: os.environ/AZURE_AI_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_AI_FOUNDRY_KEY

  - model_name: phi-3.5-mini
    litellm_params:
      model: azure_ai/Phi-3.5-mini-instruct
      api_base: os.environ/AZURE_AI_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_AI_FOUNDRY_KEY

  - model_name: phi-3.5-moe
    litellm_params:
      model: azure_ai/Phi-3.5-MoE-instruct
      api_base: os.environ/AZURE_AI_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_AI_FOUNDRY_KEY

  # ── Azure AI Foundry — Open models ──────────────────────────────────────────
  - model_name: llama-3.3-70b
    litellm_params:
      model: azure_ai/Meta-Llama-3.3-70B-Instruct
      api_base: os.environ/AZURE_AI_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_AI_FOUNDRY_KEY

  - model_name: llama-3.1-405b
    litellm_params:
      model: azure_ai/Meta-Llama-3.1-405B-Instruct
      api_base: os.environ/AZURE_AI_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_AI_FOUNDRY_KEY

  - model_name: mistral-large-2
    litellm_params:
      model: azure_ai/Mistral-Large-2411
      api_base: os.environ/AZURE_AI_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_AI_FOUNDRY_KEY

  - model_name: deepseek-r1
    litellm_params:
      model: azure_ai/DeepSeek-R1
      api_base: os.environ/AZURE_AI_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_AI_FOUNDRY_KEY

  - model_name: cohere-command-r-plus
    litellm_params:
      model: azure_ai/Cohere-command-r-plus-08-2024
      api_base: os.environ/AZURE_AI_FOUNDRY_ENDPOINT
      api_key: os.environ/AZURE_AI_FOUNDRY_KEY

litellm_settings:
  drop_params: true
  request_timeout: 600
  num_retries: 3
  allowed_fails: 1
  fallbacks:
    - claude-sonnet-4-6:
        - gemini-1.5-pro

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: true
