model_list:
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: github-gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: https://models.inference.ai.azure.com
      api_key: os.environ/GITHUB_MODELS_API_KEY

  - model_name: local
    litellm_params:
      model: ollama/llama3.2
      api_base: http://ollama:11434

  # GitHub Copilot (requires GITHUB_COPILOT_TOKEN — PAT with Copilot access)
  - model_name: copilot-gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  - model_name: copilot-gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  - model_name: copilot-o3-mini
    litellm_params:
      model: openai/o3-mini
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  - model_name: copilot-claude-3.5-sonnet
    litellm_params:
      model: openai/claude-3.5-sonnet   # Copilot exposes it via OpenAI-compat API
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_COPILOT_TOKEN

  # Azure AI Foundry (Azure OpenAI)
  - model_name: azure-gpt-4o
    litellm_params:
      model: azure/gpt-4o
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  - model_name: azure-gpt-4o-mini
    litellm_params:
      model: azure/gpt-4o-mini
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  - model_name: azure-o3-mini
    litellm_params:
      model: azure/o3-mini
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  - model_name: azure-gpt-4.1
    litellm_params:
      model: azure/gpt-4.1
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

litellm_settings:
  drop_params: true
  request_timeout: 600
  num_retries: 3
  allowed_fails: 1
  fallbacks:
    - claude-sonnet-4-6:
        - gemini-1.5-pro

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: true
